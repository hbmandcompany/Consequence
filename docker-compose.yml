services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: consequence-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-consequence_dev_key}
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  meili_data:
